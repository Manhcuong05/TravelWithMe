spring:
  application:
    name: travel

  datasource:
    url: jdbc:postgresql://localhost:5432/travel_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
    open-in-view: false

server:
  port: 8080
